# Database Configuration Template
# Update these values with your actual database settings

# PostgreSQL Database Connection
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5432/iduka_db
db.username=postgres
db.password=your_postgres_password_here

# Connection Pool Settings
db.maxConnections=10
db.minConnections=2
db.connectionTimeout=30000

# File Upload Settings
upload.path=uploads
upload.maxFileSize=52428800
upload.allowedTypes=jpg,jpeg,png,gif,mp4,mov,avi

# Application Settings
app.name=IDUKA
app.version=2.0
app.debug=false

# Email Settings (for notifications)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.username=your-email@gmail.com
email.password=your-app-password
email.from=noreply@iduka.rw

# Security Settings
security.jwt.secret=your-secret-key-here
security.jwt.expiration=86400000

# Payment Settings
payment.mtn.enabled=true
payment.airtel.enabled=true
payment.bank.enabled=true
payment.cod.enabled=true
