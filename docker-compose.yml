version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: iduka_postgres
    environment:
      POSTGRES_DB: iduka_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - iduka_network
    restart: unless-stopped

  # Backend API Server
  api:
    build: .
    container_name: iduka_api
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iduka_db
      DB_USER: postgres
      DB_PASSWORD: password123
      JWT_SECRET: your_super_secret_jwt_key_here_change_in_production
      JWT_EXPIRE: 7d
      PORT: 5000
      UPLOAD_PATH: ./uploads
      MAX_FILE_SIZE: 10485760
      MTN_MOMO_API_KEY: your_mtn_momo_api_key
      MTN_MOMO_SECRET: your_mtn_momo_secret
      AIRTEL_MONEY_API_KEY: your_airtel_money_api_key
      AIRTEL_MONEY_SECRET: your_airtel_money_secret
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - iduka_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/auth/verify"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: iduka_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./client/build:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - iduka_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  iduka_network:
    driver: bridge
